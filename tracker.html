<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>RSVP Tracker | Wood &amp; Wine</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --wine: #722F37;
    --wine-deep: #4A1E24;
    --wood: #8B6F47;
    --wood-dark: #3D2817;
    --cream: #F5EBDC;
    --cream-soft: #FAF5EC;
    --gold: #C9A961;
    --green: #5C7C5A;
    --gray: #8E8580;
    --ink: #2C1810;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--cream-soft);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--wine-deep);
    color: var(--cream);
    padding: 3rem 1.5rem 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(201, 169, 97, 0.15), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(201, 169, 97, 0.1), transparent 50%);
  }

  .header-inner { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; }

  .header-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .header-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    opacity: 0.9;
  }

  /* STATS */
  .stats {
    max-width: 900px;
    margin: -2.5rem auto 3rem;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    position: relative;
    z-index: 3;
  }

  .stat-card {
    background: var(--cream);
    padding: 1.75rem 1rem;
    text-align: center;
    box-shadow: 0 10px 30px rgba(45, 24, 16, 0.1);
    border-top: 3px solid var(--gold);
  }

  .stat-card.yes { border-top-color: var(--green); }
  .stat-card.no { border-top-color: var(--gray); }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 3.5rem);
    font-weight: 500;
    line-height: 1;
    color: var(--wine-deep);
    margin-bottom: 0.5rem;
  }

  .stat-card.yes .stat-value { color: var(--green); }
  .stat-card.no .stat-value { color: var(--gray); }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--wine);
    font-weight: 600;
  }

  /* CONTROLS */
  .controls {
    max-width: 1100px;
    margin: 0 auto 1.5rem;
    padding: 0 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .refresh-info {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--wood-dark);
    font-size: 1rem;
  }

  .refresh-btn {
    padding: 0.6rem 1.25rem;
    background: transparent;
    color: var(--wine);
    border: 1px solid var(--wine);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover { background: var(--wine); color: var(--cream); }

  /* TABLE */
  .table-wrap {
    max-width: 1100px;
    margin: 0 auto 4rem;
    padding: 0 1.5rem;
    overflow-x: auto;
  }

  .rsvp-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--cream);
    box-shadow: 0 5px 20px rgba(45, 24, 16, 0.08);
  }

  .rsvp-table th {
    background: var(--wine-deep);
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 1rem 1.25rem;
    text-align: left;
    white-space: nowrap;
  }

  .rsvp-table td {
    padding: 1.1rem 1.25rem;
    border-bottom: 1px solid rgba(114, 47, 55, 0.1);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--ink);
    vertical-align: top;
  }

  .rsvp-table tr:last-child td { border-bottom: none; }

  .rsvp-table tr:hover td { background: rgba(201, 169, 97, 0.06); }

  .attendance-badge {
    display: inline-block;
    padding: 0.25rem 0.7rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 2px;
  }

  .attendance-badge.yes { background: var(--green); color: var(--cream); }
  .attendance-badge.no { background: var(--gray); color: var(--cream); }

  .guest-tag {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 600;
    margin-left: 0.4rem;
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--cream);
    color: var(--wood-dark);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.3rem;
    box-shadow: 0 5px 20px rgba(45, 24, 16, 0.08);
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--wood-dark);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
  }

  .error {
    text-align: center;
    padding: 3rem 2rem;
    background: rgba(114, 47, 55, 0.08);
    color: var(--wine-deep);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    border: 1px solid rgba(114, 47, 55, 0.3);
  }

  .error code {
    display: inline-block;
    background: rgba(45, 24, 16, 0.08);
    padding: 0.2rem 0.5rem;
    font-family: 'Inter', monospace;
    font-size: 0.85rem;
    border-radius: 2px;
  }

  /* FOOTER */
  .footer {
    background: var(--wood-dark);
    color: rgba(245, 235, 220, 0.6);
    padding: 1.5rem;
    text-align: center;
    font-size: 0.8rem;
  }

  .footer a { color: var(--gold); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header { padding: 2.5rem 1rem 3.5rem; }
    .stats { grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; padding: 0 1rem; }
    .stat-card { padding: 1.25rem 0.5rem; }
    .stat-label { font-size: 0.6rem; letter-spacing: 0.15em; }
    .controls { padding: 0 1rem; }
    .table-wrap { padding: 0 1rem; }
    .rsvp-table th, .rsvp-table td { padding: 0.85rem 0.75rem; }
    .rsvp-table { font-size: 0.95rem; }
  }
</style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-eyebrow">Private &middot; For Mom</div>
      <h1 class="header-title">RSVP Tracker</h1>
      <div class="header-sub">Wood &amp; Wine &middot; Thursday, June 25</div>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card yes">
      <div class="stat-value" id="stat-yes">—</div>
      <div class="stat-label">Attending</div>
    </div>
    <div class="stat-card no">
      <div class="stat-value" id="stat-no">—</div>
      <div class="stat-label">Declined</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total RSVPs</div>
    </div>
  </div>

  <div class="controls">
    <span class="refresh-info" id="refresh-info">Loading...</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">Refresh Now</button>
  </div>

  <div class="table-wrap">
    <div id="content">
      <div class="loading">Loading RSVPs...</div>
    </div>
  </div>

  <footer class="footer">
    <p>Wood &amp; Wine RSVP Tracker &middot; Auto-refreshes every minute</p>
    <p><a href="index.html">View invitation page</a></p>
  </footer>

  <script>
    // ====== PASTE YOUR PUBLISHED CSV URL HERE ======
    // To get this URL:
    // 1. In your Google Form, click "Responses" tab
    // 2. Click the green Google Sheets icon (creates a linked Sheet)
    // 3. Open the Sheet, then File > Share > Publish to web
    // 4. Pick "Entire document" as content, "Comma-separated values (.csv)" as format
    // 5. Click Publish, copy the URL, paste it below
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzsREECW6PyCq3BptPA3CixgJ6eVzgbqEKAppuirIwZ7Sbkpq_Kal3iweW_CnYKD0J93pwdi65ZcLx/pub?gid=947765564&single=true&output=csv';
    // ================================================

    const REFRESH_INTERVAL_MS = 60000;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i + 1] === '"') { cell += '"'; i++; }
          else if (c === '"') { inQuotes = false; }
          else { cell += c; }
        } else {
          if (c === '"') { inQuotes = true; }
          else if (c === ',') { row.push(cell); cell = ''; }
          else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
          else if (c === '\r') { /* skip */ }
          else { cell += c; }
        }
      }
      if (cell || row.length) { row.push(cell); rows.push(row); }
      return rows.filter(r => r.some(v => v.trim()));
    }

    function findCol(headers, ...candidates) {
      for (const cand of candidates) {
        const idx = headers.findIndex(h => h.toLowerCase().includes(cand.toLowerCase()));
        if (idx >= 0) return idx;
      }
      return -1;
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
               ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } catch (e) { return ts; }
    }

    function render(rows) {
      const content = document.getElementById('content');
      if (!rows || rows.length < 2) {
        content.innerHTML = '<div class="empty">No RSVPs yet. As they come in, they will appear here automatically.</div>';
        document.getElementById('stat-yes').textContent = '0';
        document.getElementById('stat-no').textContent = '0';
        document.getElementById('stat-total').textContent = '0';
        return;
      }
      const headers = rows[0];
      const data = rows.slice(1);
      const iTime = findCol(headers, 'timestamp');
      const iAttend = findCol(headers, 'joining', 'attend');
      const iName = findCol(headers, 'name');
      const iCompany = findCol(headers, 'company');
      const iGuest = findCol(headers, 'guest');
      const iDiet = findCol(headers, 'dietary');
      const iComments = findCol(headers, 'comments', 'questions');

      let yes = 0, no = 0;
      data.forEach(r => {
        const a = (r[iAttend] || '').toLowerCase();
        if (a.startsWith('yes')) yes++;
        else if (a.startsWith('sorry') || a.includes("can't") || a.includes('cannot')) no++;
      });

      document.getElementById('stat-yes').textContent = yes;
      document.getElementById('stat-no').textContent = no;
      document.getElementById('stat-total').textContent = data.length;

      let html = '<table class="rsvp-table"><thead><tr>';
      html += '<th>Name</th><th>Company</th><th>Status</th><th>Dietary</th><th>Comments</th><th>Submitted</th>';
      html += '</tr></thead><tbody>';
      data.slice().reverse().forEach(r => {
        const attend = r[iAttend] || '';
        const isYes = attend.toLowerCase().startsWith('yes');
        const guest = r[iGuest] || '';
        const isPlusOne = guest.toLowerCase().includes('+1');
        html += '<tr>';
        html += '<td><strong>' + escapeHtml(r[iName] || '') + '</strong>';
        if (isYes && isPlusOne) html += '<span class="guest-tag">+1</span>';
        html += '</td>';
        html += '<td>' + escapeHtml(r[iCompany] || '') + '</td>';
        html += '<td><span class="attendance-badge ' + (isYes ? 'yes' : 'no') + '">' +
                (isYes ? 'Yes' : 'No') + '</span></td>';
        html += '<td>' + escapeHtml(r[iDiet] || '—') + '</td>';
        html += '<td>' + escapeHtml(r[iComments] || '') + '</td>';
        html += '<td><em>' + escapeHtml(formatTimestamp(r[iTime] || '')) + '</em></td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function showError(msg) {
      document.getElementById('content').innerHTML =
        '<div class="error"><strong>Cannot load RSVPs yet.</strong><br><br>' +
        msg +
        '<br><br>Once you publish the Google Sheet to web as CSV and paste the URL into the script, this tracker will start showing responses.</div>';
    }

    async function loadData() {
      const info = document.getElementById('refresh-info');
      info.textContent = 'Refreshing...';
      if (!CSV_URL || CSV_URL === 'PASTE_CSV_URL_HERE') {
        showError('The data source has not been configured yet. Replace <code>PASTE_CSV_URL_HERE</code> in tracker.html with your published Google Sheet CSV URL.');
        info.textContent = 'Not configured';
        return;
      }
      try {
        const res = await fetch(CSV_URL + '&_t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        render(rows);
        const now = new Date();
        info.textContent = 'Updated ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      } catch (e) {
        showError('Network error: ' + e.message);
        info.textContent = 'Error - retrying in 60s';
      }
    }

    loadData();
    setInterval(loadData, REFRESH_INTERVAL_MS);
  </script>

</body>
</html>
